name: Build Android APK Spensix
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Generate Cordova Project
        run: |
          mkdir cordova-app
          cd cordova-app
          cordova create . com.spensix.smartexam "Spensix Smart Exam"
          cp ../config.xml ./config.xml
          cordova platform add android
          
      - name: Compile to APK with Ninja Patch
        run: |
          cd cordova-app
          # 🥷 SCRIPT NINJA: Menyisipkan android:exported="true" secara paksa ke sistem Android 12+
          sed -i 's/<receiver android:name="jk.cordova.plugin.kiosk.MyPackageReplacedEventReceiver">/<receiver android:name="jk.cordova.plugin.kiosk.MyPackageReplacedEventReceiver" android:exported="true">/g' platforms/android/app/src/main/AndroidManifest.xml
          
          # Mulai cetak APK
          cordova build android --debug

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Spensix-Smart-Exam-APK
          path: cordova-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
